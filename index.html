// 事件绑定与中文输入法兼容及盲打模式内置词典长按查词
document.addEventListener('DOMContentLoaded', () => {
    const hiddenInput = document.getElementById('typingHiddenInput');
    if(hiddenInput) {
        hiddenInput.addEventListener('input', handleTypingInput);

        // --- 新增：Enter 键专属查词拦截 ---
        hiddenInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // 彻底屏蔽回车键的文字输入
                if (!typingTargetText) return;
                
                let pos = hiddenInput.value.length;
                let target = typingTargetText;
                
                // 如果光标当前位置刚好是字母（比如停在下一个单词的首字母），直接从当前位置查词
                // 否则（比如光标在空格、标点上），才往前退一位查找上一个单词，精准避免回退过多
                let start = pos;
                if (start >= target.length || !/[a-zA-Z]/.test(target[start])) {
                    start = pos - 1;
                }
                if (start >= 0 && !/[a-zA-Z]/.test(target[start])) {
                    start--;
                }
                if (start < 0 || start >= target.length) return;
                
                // 向左扩展找词头
                let left = start;
                while (left > 0 && /[a-zA-Z0-9'\-]/.test(target[left - 1])) {
                    left--;
                }
                // 向右扩展找词尾
                let right = start;
                while (right < target.length && /[a-zA-Z0-9'\-]/.test(target[right])) {
                    right++;
                }
                
                let word = target.substring(left, right);
                if (word && window.lookupWord) {
                    speakTTS(word);
                    window.lookupWord(word);
                    setTimeout(focusTypingInput, 500);
                    setTimeout(focusTypingInput, 1500);
                }
            }
        });
    }

    let typingFingerTimer = null;
    let typingLongPressActive = false;
    let tStartX = 0, tStartY = 0;
    let tTargetElement = null;

    const typingCard = document.getElementById('typingLandscapeCard');
    if (!typingCard) return;

    typingCard.addEventListener('touchstart', (e) => {
        const clientX = e.touches[0].clientX;
        const clientY = e.touches[0].clientY;
        
        tTargetElement = e.target.closest('[data-word]') || e.target.closest('#typingTextContainer');
        if (!tTargetElement) return;
        
        typingLongPressActive = false;
        tStartX = clientX;
        tStartY = clientY;
        
        typingFingerTimer = setTimeout(() => {
            typingLongPressActive = true;
            let word = "";
            if (tTargetElement.hasAttribute('data-word')) {
                word = tTargetElement.getAttribute('data-word');
            } else if (tTargetElement.id === 'typingTextContainer' || tTargetElement.closest('#typingTextContainer')) {
                if (e.target.classList.contains('t-char')) {
                    const spans = Array.from(tTargetElement.closest('#typingTextContainer').children);
                    const index = spans.indexOf(e.target);
                    if (index !== -1) {
                        let left = index;
                        while(left >= 0 && /[a-zA-Z0-9'\-]/.test(typingTargetText[left])) left--;
                        let right = index;
                        while(right < typingTargetText.length && /[a-zA-Z0-9'\-]/.test(typingTargetText[right])) right++;
                        word = typingTargetText.substring(left + 1, right);
                    }
                } else {
                    word = getWordAtPoint(clientX, clientY, e.target);
                }
            }
            if (word && window.lookupWord) {
                speakTTS(word);
                window.getSelection().removeAllRanges();
                if(document.activeElement && document.activeElement.id !== 'typingHiddenInput') {
                    document.activeElement.blur();
                }
                window.lookupWord(word, tTargetElement);
            }
        }, 500);
    }, { passive: true });

    typingCard.addEventListener('touchmove', (e) => {
        if (!typingFingerTimer) return;
        const moveX = Math.abs(e.touches[0].clientX - tStartX);
        const moveY = Math.abs(e.touches[0].clientY - tStartY);
        if (moveX > 12 || moveY > 12) {
            clearTimeout(typingFingerTimer);
            typingFingerTimer = null;
        }
    }, { passive: true });

    typingCard.addEventListener('touchend', (e) => {
        if (typingFingerTimer) {
            clearTimeout(typingFingerTimer);
            typingFingerTimer = null;
        }
        if (tTargetElement) {
            if (typingLongPressActive) {
                e.preventDefault();
                e.stopPropagation();
                setTimeout(focusTypingInput, 100);
            } else {
                if (tTargetElement.hasAttribute('data-word')) {
                    e.preventDefault();
                    e.stopPropagation();
                    tTargetElement.click();
                    setTimeout(focusTypingInput, 100);
                }
            }
        }
        tTargetElement = null;
    }, { passive: false });

    const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
    window.toggleBatteryVisibility = function() {
        const isHidden = localStorage.getItem('battery_hidden') === 'true';
        localStorage.setItem('battery_hidden', !isHidden);
        applyBatteryVisibility();
    };
    function applyBatteryVisibility() {
        const el = document.getElementById('batteryLevel');
        if (!el) return;
        if (isApple) { el.style.display = 'none'; return; }
        const isHidden = localStorage.getItem('battery_hidden') === 'true';
        el.style.opacity = isHidden ? '0.15' : '1';
        Array.from(el.children).forEach(c => c.style.visibility = isHidden ? 'hidden' : 'visible');
    }
    if (!isApple && 'getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            const update = () => {
                const level = Math.round(battery.level * 100);
                const bar = document.getElementById('batteryBar');
                const txt = document.getElementById('batteryText');
                if(bar) bar.style.width = level + '%';
                if(txt) txt.innerText = level + '%';
            };
            update();
            battery.addEventListener('levelchange', update);
        });
    }
    applyBatteryVisibility();

// 新增：盲打模式区域的鼠标右键（PC或长按模拟）点击查词，与回车查词逻辑完全复用、对齐

                const spans = Array.from(textContainer.querySelectorAll('.t-char'));
                const idx = spans.indexOf(e.target);
                if (idx !== -1) pos = idx;
            } else {
                // 如果点击在容器空白处，则根据光标点从坐标推算字符位置
                if (document.caretRangeFromPoint) {
                    const range = document.caretRangeFromPoint(e.clientX, e.clientY);
                    if (range && range.startContainer.parentNode.classList.contains('t-char')) {

            // 执行与回车完全一致的动态智能测词探针逻辑
            let start = pos;
            if (start >= typingTargetText.length || !/[a-zA-Z]/.test(typingTargetText[start])) {
                start = pos - 1;
            }
            if (start >= 0 && !/[a-zA-Z]/.test(typingTargetText[start])) {
                start--;
            }
            if (start < 0 || start >= typingTargetText.length) return;

            let left = start;
            while (left > 0 && /[a-zA-Z0-9'\-]/.test(typingTargetText[left - 1])) {
                left--;
            }
            let right = start;
            while (right < typingTargetText.length && /[a-zA-Z0-9'\-]/.test(typingTargetText[right])) {
                right++;
            }

            let word = typingTargetText.substring(left, right);
            if (word && window.lookupWord) {
                window.getSelection().removeAllRanges();
                window.lookupWord(word);
                setTimeout(focusTypingInput, 300);
            }
        }
    });
});

let lastRenderedInputLength = 0;
function handleTypingInput() {
    const hiddenInput = document.getElementById('typingHiddenInput');

    // --- 暴力拦截：移动端键盘/输入法防污染与触发器 ---
    if (hiddenInput.value.includes('/')) {
        // 瞬间剥离斜杠，防止进入错字判定
        hiddenInput.value = hiddenInput.value.replace(/\//g, '');
        
        let pos = hiddenInput.value.length;
        let start = pos === typingTargetText.length ? pos - 1 : pos;
        if (start >= 0 && !/[a-zA-Z]/.test(typingTargetText[start])) start--;
        if (start >= 0) {
            let left = start; while (left > 0 && /[a-zA-Z0-9'\-]/.test(typingTargetText[left - 1])) left--;
            let right = start; while (right < typingTargetText.length && /[a-zA-Z0-9'\-]/.test(typingTargetText[right])) right++;
            const word = typingTargetText.substring(left, right);
            if (word) {
                let activeSIdx = typingSentenceBounds.findIndex(b => pos >= b.start && pos <= b.end);
                if (activeSIdx === -1 && pos >= typingTargetText.length) activeSIdx = typingSentenceBounds.length - 1;
                let sentence = typingTargetText;
                if (activeSIdx !== -1) {
                    sentence = typingTargetText.substring(typingSentenceBounds[activeSIdx].start, typingSentenceBounds[activeSIdx].end + 1).trim();
                }
                // 只要触发了 / 键，无论屏幕比例均强制开启侧边栏并触发 AI 解析
                if(typeof openDictSidebar === 'function') {
                    openDictSidebar(word);
                    // 延迟 50ms 触发 AI，确保字典查询的初始 HTML 清理动作已完成，防止 UI 冲突
                    setTimeout(() => {
                        if(typeof triggerFrontendAI === 'function') triggerFrontendAI(word, sentence);
                    }, 50);
                }
            }
        }
        return; // 终止本次打字判定
    }

    if (!isTypingPlaying) {
        startTypingTimer();
        // 只要开始输入字符，立刻记录已练过该卡片
        if (typingCurrentData) {
            markCardAsTyped(`${typingCurrentData.c}_${typingCurrentData.theme}`);
        }
    }

    let currentInput = hiddenInput.value
        .replace(/，/g, ',')
        .replace(/。/g, '.')
        .replace(/！/g, '!')
        .replace(/？/g, '?')
        .replace(/（/g, '(')
        .replace(/）/g, ')')
        .replace(/“|”/g, '"')
        .replace(/‘|’/g, "'")
        .replace(/；/g, ';')
        .replace(/：/g, ':');

    const spans = document.querySelectorAll('#typingTextContainer .t-char');
    
    if (currentInput.length > typingTargetText.length) {
        currentInput = currentInput.substring(0, typingTargetText.length);
        hiddenInput.value = currentInput;
        return;
    }

    if (currentInput.length > typingLastInputLength) {
        const lastTypedIdx = currentInput.length - 1;
        if (currentInput[lastTypedIdx] !== typingTargetText[lastTypedIdx]) {
            playErrorSound();
        } else {
            checkAndReadNextWord(currentInput.length);
        }
    } else if (currentInput.length < typingLastInputLength) {
        checkAndReadNextWord(currentInput.length);
    }
    typingLastInputLength = currentInput.length;

    // 实时中英文焦点高亮联动
    const currentPos = currentInput.length;
    let activeSentenceIdx = typingSentenceBounds.findIndex(b => currentPos >= b.start && currentPos <= b.end);
    if (activeSentenceIdx === -1 && currentPos >= typingTargetText.length) activeSentenceIdx = typingSentenceBounds.length - 1;
    if (activeSentenceIdx === -1 && typingSentenceBounds.length > 0) activeSentenceIdx = 0;
    
    if (activeSentenceIdx !== currentTypingSentenceIndex) {
        currentTypingSentenceIndex = activeSentenceIdx;
        document.querySelectorAll('.t-zh-sentence').forEach((el, idx) => {
            if (idx === activeSentenceIdx) {
                el.classList.add('t-active-focus');
                el.style.opacity = '1';
            } else {
                el.classList.remove('t-active-focus');
                el.style.opacity = '0.3';
            }
        });
    }

    // 🚀 核心无感优化：通过数学裁剪，只精准计算和刷新光标前后 3 个字符，冻结其余上百个 Span
    const startIdx = Math.max(0, Math.min(lastRenderedInputLength, currentInput.length) - 2);
    const endIdx = Math.min(typingTargetText.length, Math.max(lastRenderedInputLength, currentInput.length) + 3);
    
    for (let index = startIdx; index < endIdx; index++) {
        const span = spans[index];
        if (!span) continue;
        const charTarget = typingTargetText[index];
        const charTyped = currentInput[index];
        const isSpace = charTarget === ' ';
        const isHint = !isSpace && (!/[a-zA-Z0-9]/.test(charTarget) || (index === 0 || !/[a-zA-Z0-9]/.test(typingTargetText[index - 1])));
        
        span.className = 't-char';

        if (index < currentInput.length) {
            span.style.color = 'var(--text-color)';
            if (charTyped === charTarget) {
                span.classList.add('t-correct');
                span.innerText = isSpace ? '\u00A0' : charTarget;
            } else {
                span.classList.add('t-error');
                span.innerText = charTyped === ' ' ? '␣' : charTyped;
            }
        } else if (index === currentInput.length) {
            span.classList.add('t-current');
            span.style.color = 'var(--accent)';
            span.innerText = isSpace ? '_' : charTarget;
        } else {
            span.style.color = isHint ? '' : 'transparent';
            span.innerText = isSpace ? '\u00A0' : charTarget;
            if (!isSpace) span.classList.add('t-untyped-placeholder');
        }
    }
    lastRenderedInputLength = currentInput.length;

    updateTypingStats();

    if (currentInput.length === typingTargetText.length) {
        endTyping();
    }
}

// 🚀 纯净前端词典侧边栏系统 (彻底抛弃 Node.js 后端版)
// ==========================================
const DICT_DB_NAME = "MyPureDictDB";
const DICT_STORE_NAME = "words";
let localDictDb;

function initDictDB() {
    const req = indexedDB.open(DICT_DB_NAME, 1);
    req.onupgradeneeded = (e) => {
        const tempDb = e.target.result;
        if (!tempDb.objectStoreNames.contains(DICT_STORE_NAME)) {
            tempDb.createObjectStore(DICT_STORE_NAME, { keyPath: "word" });
        }
    };
    req.onsuccess = (e) => {
        localDictDb = e.target.result;
        checkDictDB();
    };
}

function checkDictDB() {
    const tx = localDictDb.transaction([DICT_STORE_NAME], "readonly");
    const store = tx.objectStore(DICT_STORE_NAME);
    const countReq = store.count();
    countReq.onsuccess = () => {
        const count = countReq.result;
        const statusEl = document.getElementById('dict-status-bar');
        if (count > 0) {
            statusEl.innerHTML = `<span style="color:var(--app-accent)">✅ 纯前端引擎就绪！已挂载 ${count} 个词条</span>`;
        } else {
            statusEl.innerHTML = `<span style="color:#ff3b30">⚠️ 词库空载，请点击 📦 导入纯净 JSON</span>`;
        }
    };
}

function importDataToDB(input) {
    const file = input.files[0];
    if (!file) return;
    const statusEl = document.getElementById('dict-status-bar');
    statusEl.innerHTML = `<span style="color:#ffcc00">⏳ 正在向 IndexedDB 极速写入，请稍候...</span>`;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            const tx = localDictDb.transaction([DICT_STORE_NAME], "readwrite");
            const store = tx.objectStore(DICT_STORE_NAME);
            let imported = 0;
            for (const [key, val] of Object.entries(data)) {
                store.put({ word: key.toLowerCase(), translation: val.translation });
                imported++;
            }
            tx.oncomplete = () => {
                alert(`🎉 成功导入 ${imported} 个词条到浏览器原生数据库！`);
                checkDictDB();
            };
            tx.onerror = () => {
                alert("写入数据库时发生错误！");
                checkDictDB();
            };
        } catch(err) {
            alert("JSON 解析失败！请确保文件格式正确。");
            checkDictDB();
        }
    };
    reader.readAsText(file);
}

function openDictSidebar(word) {
    const sidebar = document.getElementById('dictSidebar');
    if(!sidebar.classList.contains('active')) {
        sidebar.classList.add('active');
        document.body.classList.add('sidebar-active');

        }

                setTimeout(() => drawTypingTree(typingCurrentData, document.getElementById('typingTreeContainer')), 310);
            }

}

function closeDictSidebar() {
    document.getElementById('dictSidebar').classList.remove('active');
    document.body.classList.remove('sidebar-active');
    if (document.getElementById('lightbox').style.display === 'flex') {
        setTimeout(updateLightboxContent, 300);
    }

        setTimeout(() => drawTypingTree(typingCurrentData, document.getElementById('typingTreeContainer')), 310);
    }
}

window.liveSearch = function(word) { if(word) queryDictionary(word); };

function queryDictionary(word) {
    // 触发朗读
    speakTTS(word);
    const contentArea = document.getElementById('dict-content-area');
    // 彻底清空内容区域，确保单词解析与语法解析互斥显示
    contentArea.innerHTML = '<p id="dict-loading-tip" style="opacity:0.5; text-align:center; padding-top: 40px;">⚡ 本地极速检索中...</p>';
    
    if(!localDictDb) {
        contentArea.innerHTML = '<p style="color:#ff3b30; text-align:center; padding-top: 40px;">⚠️ 本地词库未挂载</p>';
        return;
    }
    
    const cleanWord = word.trim().toLowerCase();
    const getCands = (w) => {
        const c = new Set([w]);
        if (w.length < 3) return [w];
        if (w.endsWith('ies')) c.add(w.slice(0, -3) + 'y');
        if (w.endsWith('ied')) c.add(w.slice(0, -3) + 'y');
        if (w.endsWith('ing')) { c.add(w.slice(0, -3)); c.add(w.slice(0, -3) + 'e'); }
        if (w.endsWith('ed')) { c.add(w.slice(0, -2)); c.add(w.slice(0, -1)); }
        if (w.endsWith('es')) c.add(w.slice(0, -2));
        if (w.endsWith('s') && !w.endsWith('ss')) c.add(w.slice(0, -1));
        return Array.from(c);
    };
    
    const candidates = getCands(cleanWord);
    const tx = localDictDb.transaction([DICT_STORE_NAME], "readonly");
    const store = tx.objectStore(DICT_STORE_NAME);
    
    const tryFind = (idx) => {
        if(idx >= candidates.length) {
            contentArea.innerHTML = `<div class="mdx-res-container" style="position:relative; padding:30px 20px; border:none;"><button class="icon-btn" style="position:absolute; top:20px; right:15px; padding: 4px 10px; font-size: 12px; color: #fff; background: #ff3b30 !important; border: none; z-index:200;" onclick="closeDictSidebar()">✕</button><p style="color:#666;text-align:center;padding-top:40px;">本地纯净词典中未找到该词释义</p></div>`;
            return;
        }
        const req = store.get(candidates[idx]);
        req.onsuccess = (e) => {
            const res = e.target.result;
            if(res) {
                contentArea.innerHTML = `<div class="mdx-res-container" style="position:relative; padding:30px 20px; border:none;">
                    <button class="icon-btn" style="position:absolute; top:20px; right:15px; padding: 4px 10px; font-size: 12px; color: #fff; background: #ff3b30 !important; border: none; z-index:200;" onclick="closeDictSidebar()">✕</button>
                    <div style="font-size:32px; font-weight:900; color:var(--app-accent); font-family:monospace; margin-bottom:20px; border-bottom:2px solid var(--app-accent); padding-bottom:12px; padding-right:50px;">${res.word}</div>
                    <div class="dict-mdx-content" style="font-size:16px; line-height:1.8; color:var(--app-text);">${res.translation}</div>
                </div>`;
            } else {
                tryFind(idx + 1);
            }
        };
    };
    tryFind(0);
}

// 纯前端直接呼叫 Gemini 发射器
async function triggerFrontendAI(word, sentence) {
    const apiKey = localStorage.getItem('gemini_api_key');
    const contentArea = document.getElementById('dict-content-area');
    
    // 彻底清空内容区域，确保语法解析完全替换单词解析
    contentArea.innerHTML = `<div class="ai-res-container" id="ai-loading" style="position:relative; padding:40px 20px; text-align:center;">
        <button class="icon-btn" style="position:absolute; top:20px; right:15px; padding: 4px 10px; font-size: 12px; color: #fff; background: #ff3b30 !important; border: none; z-index:200;" onclick="closeDictSidebar()">✕</button>
        <p style="color:var(--app-accent); font-family:monospace; font-weight:bold; margin:0;">⚡ 正在呼叫 Gemini 进行语境解析...</p>
    </div>`;
    contentArea.scrollTop = contentArea.scrollHeight;

    if(!apiKey) {
        document.getElementById('ai-loading').innerHTML = `<p style="color:#ff3b30; margin:0;">尚未配置 Gemini API Key，请点击右上角 ⚙️</p>`;
        return;
    }

    try {
        const prompt = `你是一个专业的英语语法与语境解析内核。请结合这句话的语境：\n"${sentence}"\n\n为我精准、简短、极客风格地分析单词 "${word}" 在此处的：\n1. 词性与句法功能\n2. 确切含义\n3. 用法精髓或固定搭配\n直接输出结果，拒绝客套废话，使用 Markdown 排版。`;
        
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite:generateContent?key=${apiKey}`;
        const res = await fetch(apiUrl, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ contents: [{parts: [{text: prompt}]}] }) 
        });
        
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);
        
        let mdText = data.candidates[0].content.parts[0].text;
        let htmlText = mdText.replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--app-accent)">$1</b>')
                             .replace(/\*(.*?)\*/g, '<i>$1</i>')
                             .replace(/\n/g, '<br>');
        
        document.getElementById('ai-loading').outerHTML = `<div class="ai-res-container" style="position:relative; padding:30px 20px; font-size:15px; line-height:1.7;">
            <button class="icon-btn" style="position:absolute; top:20px; right:15px; padding: 4px 10px; font-size: 12px; color: #fff; background: #ff3b30 !important; border: none; z-index:200;" onclick="closeDictSidebar()">✕</button>
            <div style="font-weight:bold; font-size:18px; color:var(--app-accent); margin-bottom:12px; border-bottom:2px solid var(--app-accent); padding-bottom:8px;">🧠 AI 语境手术刀</div>
            <div style="padding-top:10px;">${htmlText}</div>
        </div>`;
        contentArea.scrollTop = contentArea.scrollHeight;
    } catch (err) {
        document.getElementById('ai-loading').innerHTML = `<p style="color:#ff3b30; margin:0;">AI 解析失败: ${err.message}</p>`;
    }
}

function openKeyModal() {
    document.getElementById('ai-key-input').value = localStorage.getItem('gemini_api_key') || '';
    document.getElementById('ai-key-modal').style.display = 'flex';
}

function saveApiKey() {
    const key = document.getElementById('ai-key-input').value.trim();
    localStorage.setItem('gemini_api_key', key);
    document.getElementById('ai-key-modal').style.display = 'none';
    alert('✅ API Key 已安全固化在本地浏览器！');
}

// --- 终极保底防丢机制：监测切后台与杀进程 ---
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
        saveProgressToDB();
    }
});
window.addEventListener('pagehide', () => {
    saveProgressToDB();
});

document.addEventListener('DOMContentLoaded', () => {
    initDictDB();
    const ca = document.getElementById('dict-content-area');
    if(ca) {
        ca.addEventListener('click', (e) => {
            if (e.target.tagName === 'A' || e.target.closest('a')) return;
            if (document.caretRangeFromPoint) {
                const range = document.caretRangeFromPoint(e.clientX, e.clientY);
                if (!range || range.startContainer.nodeType !== 3) return;
                const text = range.startContainer.textContent;
                let offset = range.startOffset;
                let start = offset, end = offset;
                while (start > 0 && /[a-zA-Z]/.test(text[start - 1])) start--;
                while (end < text.length && /[a-zA-Z]/.test(text[end])) end++;
                const word = text.slice(start, end);
                if (word.length > 1) queryDictionary(word);
            }
        });
    }
});
